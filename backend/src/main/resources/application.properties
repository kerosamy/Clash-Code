# Application name
spring.application.name=backend
# Enable ANSI colors in Spring Boot logs
spring.output.ansi.enabled=ALWAYS

# MySQL Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/clash_code_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

security.jwt.secret-key =${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

# JPA / Hibernate
# Change update with create-drop to remove the data after closing the connection
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# MultipartFile
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
clashcode.filesystem.base-path=${CLASH_CODE_FS_PATH}