# Application name
spring.application.name=backend
# Enable ANSI colors in Spring Boot logs
spring.output.ansi.enabled=ALWAYS

# MySQL Database connection
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Security
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000
server.forward-headers-strategy=framework

GEMINI_API_KEY=${GEMINI_API_KEY}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.placeholders.BASE_PATH=${CLASH_CODE_FS_PATH}
spring.flyway.placeholder-replacement=true

# MultipartFile
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
clashcode.filesystem.base-path=${CLASH_CODE_FS_PATH}

# Judge0
clashcode.judge0.url=${CLASH_CODE_JUDGE0_URL}

#cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
# Redis

spring.data.redis.host=${REDISHOST}
spring.data.redis.port=${REDISPORT}
spring.data.redis.username=${REDISUSER}
spring.data.redis.password=${REDISPASSWORD}
spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=2000

