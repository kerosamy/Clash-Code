# Application name
spring.application.name=backend
# Enable ANSI colors in Spring Boot logs
spring.output.ansi.enabled=ALWAYS

# MySQL Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/clash_code_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Security
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000



# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=true
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.placeholders.BASE_PATH=${CLASH_CODE_FS_PATH}
spring.flyway.placeholder-replacement=true


# MultipartFile
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
clashcode.filesystem.base-path=${CLASH_CODE_FS_PATH}

# Judge0
clashcode.judge0.url=${CLASH_CODE_JUDGE0_URL}